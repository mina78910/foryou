<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Style RPG - 属性診断</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffd700;
            --bg-dark: #1a1a2e;
            --card-bg: #16213e;
            --text: #e94560;
            --white: #ffffff;
        }

        body {
            font-family: 'DotGothic16', sans-serif;
            background-color: var(--bg-dark);
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        #game-container {
            width: 90%;
            max-width: 600px;
            background: var(--card-bg);
            border: 4px solid var(--primary);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            position: relative;
        }

        .screen { display: none; text-align: center; }
        .screen.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { color: var(--primary); font-size: 2rem; text-shadow: 2px 2px #000; }
        .btn {
            background: var(--text);
            color: white;
            border: none;
            padding: 15px 30px;
            font-family: 'DotGothic16', sans-serif;
            font-size: 1.2rem;
            cursor: pointer;
            margin: 10px;
            border-bottom: 4px solid #900;
            transition: 0.1s;
        }
        .btn:active { transform: translateY(4px); border-bottom: none; }

        .question-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #333;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: 0.3s;
        }

        .result-box {
            border: 2px solid var(--primary);
            padding: 15px;
            margin-top: 20px;
            background: rgba(0,0,0,0.5);
            text-align: left;
        }

        .type-badge {
            display: inline-block;
            padding: 5px 10px;
            background: var(--primary);
            color: black;
            font-weight: bold;
            margin-bottom: 10px;
        }

        table { width: 100%; margin-top: 10px; border-collapse: collapse; }
        td, th { border: 1px solid #555; padding: 5px; text-align: center; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen" class="screen active">
        <h1>SOCIAL STYLE<br>QUEST</h1>
        <p>あなたの深層心理を暴き、<br>真のジョブ（タイプ）を特定します。</p>
        <button class="btn" onclick="startGame()">冒険をはじめる</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="question-area">
            <p id="question-number" style="color: var(--primary);"></p>
            <div class="question-card">
                <h2 id="question-text"></h2>
            </div>
            <div class="options-grid">
                <button class="btn" onclick="answer(4)">よくあてはまる</button>
                <button class="btn" onclick="answer(3)">あてはまる</button>
                <button class="btn" onclick="answer(2)">あてはまらない</button>
                <button class="btn" onclick="answer(1)">全然あてはまらない</button>
            </div>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h1>鑑定結果</h1>
        <div class="type-badge">あなたのジョブ：</div>
        <h2 id="result-type" style="font-size: 2.5rem; margin: 10px 0;"></h2>
        <p id="result-desc"></p>
        
        <div class="result-box">
            <h3>■ パラメータ内訳</h3>
            <div id="score-details"></div>
        </div>
        
        <button class="btn" onclick="location.reload()">再鑑定する</button>
    </div>
</div>

<script>
    const questions = [
        { id: "04", text: "嫌なことは嫌、とハッキリ言える", type: "C" },
        { id: "07", text: "短い時間にできるだけ多くのことをしようとする", type: "C" },
        { id: "17", text: "自分が思ったことはストレートに言う", type: "C" },
        { id: "19", text: "競争心が強い", type: "C" },
        { id: "20", text: "何事も完全にしないと気が済まない", type: "C" },
        { id: "02", text: "常に未来に対して情熱を持っている方だ", type: "P" },
        { id: "06", text: "人から楽しい人とよく言われる", type: "P" },
        { id: "08", text: "失敗しても立ち直りが早い", type: "P" },
        { id: "11", text: "人の話を聞くことよりも自分が話していることの方が多い", type: "P" },
        { id: "14", text: "変化に強く適応力がある", type: "P" },
        { id: "03", text: "他人のためにしたことを感謝されないと悔しく思うことがよくある", type: "S" },
        { id: "09", text: "人からものを頼まれるとなかなかノーと言えない", type: "S" },
        { id: "13", text: "自分と他人をよく比較する", type: "S" },
        { id: "16", text: "相手の好き嫌いに関わらず、人の世話をしてしまう方だ", type: "S" },
        { id: "18", text: "仕事の出来栄えについて人から認められたい", type: "S" },
        { id: "01", text: "自己主張することが下手だと思う", type: "A" },
        { id: "05", text: "人にはなかなか気を許さない", type: "A" },
        { id: "10", text: "たくさんの情報を検討してから決断を下す", type: "A" },
        { id: "12", text: "どちらかと言うと、人見知りをする方だ", type: "A" },
        { id: "15", text: "何事も自分の感情を表現することが苦手だ", type: "A" }
    ];

    const typeMaster = [
        { key: "C-C", name: "コントローラー（極）", main: "C", sub: "C" },
        { key: "C-P", name: "コントローラー（P寄り）", main: "C", sub: "P" },
        { key: "C-A", name: "コントローラー（A寄り）", main: "C", sub: "A" },
        { key: "P-C", name: "プロモーター（C寄り）", main: "P", sub: "C" },
        { key: "P-P", name: "プロモーター（極）", main: "P", sub: "P" },
        { key: "P-S", name: "プロモーター（S寄り）", main: "P", sub: "S" },
        { key: "S-P", name: "サポーター（P寄り）", main: "S", sub: "P" },
        { key: "S-S", name: "サポーター（極）", main: "S", sub: "S" },
        { key: "S-A", name: "サポーター（A寄り）", main: "S", sub: "A" },
        { key: "A-C", name: "アナライザー（C寄り）", main: "A", sub: "C" },
        { key: "A-S", name: "アナライザー（S寄り）", main: "A", sub: "S" },
        { key: "A-A", name: "アナライザー（極）", main: "A", sub: "A" },
        { key: "C-S", name: "コントローラー・サポーター融合", main: "C", sub: "S" },
        { key: "P-A", name: "プロモーター・アナライザー融合", main: "P", sub: "A" }
    ];

    let currentIdx = 0;
    // 初期補正値: C=0, P=1, S=1, A=2
    let scores = { C: 0, P: 1, S: 1, A: 2 };
    let counts = { C: {4:0, 12:0}, P: {4:0, 12:0}, S: {4:0, 12:0}, A: {4:0, 12:0} };

    function startGame() {
        showScreen('quiz-screen');
        updateQuestion();
    }

    function updateQuestion() {
        if (currentIdx < questions.length) {
            document.getElementById('question-number').innerText = `QUEST: ${currentIdx + 1} / ${questions.length}`;
            document.getElementById('question-text').innerText = questions[currentIdx].text;
            document.getElementById('progress-fill').style.width = `${(currentIdx / questions.length) * 100}%`;
        } else {
            calculateResult();
        }
    }

    function answer(val) {
        const type = questions[currentIdx].type;
        scores[type] += val;

        // ルール用カウント
        if (val === 1) counts[type][4] += 1; // 選択肢1(全然あてはまらない)は点数1だが、ルール上の「4」に該当
        if (val >= 3) counts[type][12] += 1; // 選択肢4(4点) or 3(3点) = ポジティブ回答

        currentIdx++;
        updateQuestion();
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function calculateResult() {
        const types = ['C', 'P', 'S', 'A'];
        
        // 判定ルール①：重要質問に「全然あてはまらない(1点)」を選んだタイプは候補から除外（点数を大幅減）
        let adjustedScores = { ...scores };
        types.forEach(t => {
            if (counts[t][4] > 0) adjustedScores[t] -= 100;
        });

        // スコア順に並び替え
        let sorted = types.sort((a, b) => {
            // ルール②：1(よくあてはまる=4点)が多い方を優先
            // ルール③：ポジティブ回答が多い方を優先
            if (adjustedScores[b] !== adjustedScores[a]) return adjustedScores[b] - adjustedScores[a];
            return counts[b][12] - counts[a][12];
        });

        const main = sorted[0];
        const sub = sorted[1];

        // 14分類へのマッピング
        let resultKey = `${main}-${sub}`;
        // 特殊ケース（融合）のチェック
        if ((main === 'C' && sub === 'S') || (main === 'S' && sub === 'C')) resultKey = "C-S";
        if ((main === 'P' && sub === 'A') || (main === 'A' && sub === 'P')) resultKey = "P-A";
        // 極タイプ（メインとサブが僅差、または同じ方向性の場合）
        if (adjustedScores[main] - adjustedScores[sub] > 10) resultKey = `${main}-${main}`;

        const resultInfo = typeMaster.find(t => t.key === resultKey) || typeMaster.find(t => t.main === main);

        displayResult(resultInfo, scores);
    }

    function displayResult(res, finalScores) {
        showScreen('result-screen');
        document.getElementById('result-type').innerText = res.name;
        
        let scoreHtml = `<table>
            <tr><th>TYPE</th><th>SCORE</th><th>ポジティブ回答</th></tr>
            <tr><td>コントローラー</td><td>${finalScores.C}</td><td>${counts.C[12]}</td></tr>
            <tr><td>プロモーター</td><td>${finalScores.P}</td><td>${counts.P[12]}</td></tr>
            <tr><td>サポーター</td><td>${finalScores.S}</td><td>${counts.S[12]}</td></tr>
            <tr><td>アナライザー</td><td>${finalScores.A}</td><td>${counts.A[12]}</td></tr>
        </table>`;
        
        document.getElementById('score-details').innerHTML = scoreHtml;
        
        const descriptions = {
            'C': 'リーダーシップが強く、決断力のある勇者タイプ。',
            'P': '明るく社交的で、周囲を盛り上げる魔法使いタイプ。',
            'S': '協調性が高く、チームを支える僧侶タイプ。',
            'A': '冷静沈着で、分析を得意とする賢者タイプ。'
        };
        document.getElementById('result-desc').innerText = descriptions[res.main] + " あなたのサブ属性は " + res.sub + " です。";
    }
</script>

</body>
</html>
