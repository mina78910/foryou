<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌟  フォーユー診断 🌟</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Kiwi+Maru:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Playful / Neo-Pop Colors */
            --bg-base: #E0F7FA;
            --ink-black: #111111;
            --card-bg: #FFFFFF;
            
            /* アクセントカラー */
            --accent-pink: #FF4081;
            --accent-yellow: #FFEA00;
            --accent-green: #00E676;
            --accent-purple: #D500F9;
            
            /* 動的テーマカラー */
            --theme-color: var(--accent-pink);

            /* Typography */
            --font-pixel: 'DotGothic16', sans-serif;
            --font-round: 'Kiwi Maru', serif;

            /* Chunky Shadows */
            --pop-shadow: 4px 4px 0px var(--ink-black);
            --pop-shadow-active: 0px 0px 0px var(--ink-black);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            word-wrap: break-word; /* テキストのはみ出し防止 */
        }

        body {
            background-color: var(--bg-base);
            color: var(--ink-black);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(var(--ink-black) 2px, transparent 2px);
            background-size: 20px 20px;
            font-family: var(--font-round);
        }

        #app {
            width: 100%;
            max-width: 480px; /* スマホ・PC共通の最大幅 */
            background: var(--bg-base);
            border-left: 4px solid var(--ink-black);
            border-right: 4px solid var(--ink-black);
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 100vh;
            /* 画面が小さい端末への対応 */
            border-left-width: clamp(0px, 1vw, 4px);
            border-right-width: clamp(0px, 1vw, 4px);
        }

        /* Y2K風の流れるマーキーヘッダー（レスポンシブ対応） */
        .marquee-header {
            background: var(--accent-yellow);
            color: var(--ink-black);
            font-family: var(--font-pixel);
            font-weight: 400;
            font-size: 1.1rem;
            padding: 8px 0;
            border-bottom: 4px solid var(--ink-black);
            overflow: hidden;
            white-space: nowrap;
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px; /* PC閲覧時も中央に固定 */
            z-index: 100;
        }
        .marquee-content {
            display: inline-block;
            animation: marquee 15s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* 画面遷移制御 */
        .screen {
            display: none;
            flex-direction: column;
            padding: 70px 5vw 40px 5vw; /* %ベースのパディングでスマホ対応 */
            flex-grow: 1;
            position: relative;
            align-items: center;
        }

        .screen.active {
            display: flex;
        }

        /* --- スタート画面 --- */
        #start-screen.active .stagger {
            animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
            opacity: 0;
            transform: scale(0.5);
        }
        #start-screen.active .stagger:nth-child(1) { animation-delay: 0.1s; }
        #start-screen.active .stagger:nth-child(2) { animation-delay: 0.2s; }
        #start-screen.active .stagger:nth-child(3) { animation-delay: 0.3s; }

        .title-badge {
            background: var(--accent-pink);
            color: #fff;
            font-family: var(--font-pixel);
            padding: 5px 15px;
            border: 3px solid var(--ink-black);
            border-radius: 20px;
            font-size: clamp(1rem, 4vw, 1.2rem);
            transform: rotate(-5deg);
            margin-bottom: 15px;
            box-shadow: var(--pop-shadow);
        }

        .main-title {
            font-family: var(--font-round);
            /* スマホ幅に合わせてフォントサイズを可変に */
            font-size: clamp(2.5rem, 11vw, 3.8rem);
            line-height: 1.1;
            font-weight: 800;
            margin: 0 0 20px 0;
            text-align: center;
            color: #fff;
            -webkit-text-stroke: clamp(2px, 0.8vw, 3px) var(--ink-black);
            text-shadow: 4px 4px 0px var(--accent-purple);
            transform: rotate(2deg);
        }

        .hero-image-placeholder {
            font-size: clamp(4rem, 15vw, 5rem);
            margin: 10px 0 30px 0;
            animation: float 3s ease-in-out infinite;
        }

        /* おもちゃみたいなボタン */
        .btn-pop {
            font-family: var(--font-pixel);
            font-size: clamp(1.2rem, 6vw, 1.6rem);
            background: var(--card-bg);
            color: var(--ink-black);
            border: 4px solid var(--ink-black);
            border-radius: 30px;
            padding: 15px 10px;
            cursor: pointer;
            box-shadow: 0px 8px 0px var(--ink-black);
            transition: all 0.1s;
            margin-top: auto;
            margin-bottom: 20px;
            width: 100%;
            max-width: 320px;
        }
        .btn-pop:active {
            transform: translateY(8px);
            box-shadow: 0px 0px 0px var(--ink-black);
        }

        /* --- 設問画面 --- */
        .progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        .progress-bar-pop {
            flex-grow: 1;
            height: 20px;
            border: 3px solid var(--ink-black);
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 2px 2px 0px var(--ink-black);
        }
        .progress-fill {
            height: 100%;
            background: var(--accent-green);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .q-counter {
            font-family: var(--font-pixel);
            font-size: clamp(1.2rem, 5vw, 1.5rem);
            font-weight: 700;
            color: var(--ink-black);
            background: var(--accent-yellow);
            padding: 5px 10px;
            border: 3px solid var(--ink-black);
            border-radius: 10px;
            transform: rotate(3deg);
            white-space: nowrap;
        }

        .question-card {
            font-family: var(--font-round);
            font-size: clamp(1.1rem, 5vw, 1.4rem);
            font-weight: 800;
            line-height: 1.5;
            border: 4px solid var(--ink-black);
            border-radius: 20px;
            background: var(--card-bg);
            padding: clamp(20px, 6vw, 30px) 20px;
            box-shadow: var(--pop-shadow);
            margin-bottom: 30px;
            width: 100%;
            text-align: center;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 4択ボタン */
        .answers {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }
        .answer-btn {
            font-family: var(--font-round);
            font-weight: 800;
            font-size: clamp(1rem, 4vw, 1.2rem);
            background: var(--card-bg);
            border: 3px solid var(--ink-black);
            border-radius: 15px;
            color: var(--ink-black);
            padding: clamp(12px, 4vw, 15px);
            text-align: center;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--ink-black);
            transition: all 0.1s;
        }
        
        .answer-btn:nth-child(1):active { background: var(--accent-pink); }
        .answer-btn:nth-child(2):active { background: var(--accent-yellow); }
        .answer-btn:nth-child(3):active { background: var(--accent-green); }
        .answer-btn:nth-child(4):active { background: #40C4FF; }

        .answer-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--ink-black);
            color: var(--ink-black);
        }

        /* --- 結果画面（シール帳風） --- */
        #result-screen {
            padding-top: 50px;
        }
        
        #result-screen.active .stagger {
            opacity: 0;
            animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }
        #result-screen.active .stagger:nth-child(1) { animation-delay: 0.1s; }
        #result-screen.active .stagger:nth-child(2) { animation-delay: 0.2s; }
        #result-screen.active .stagger:nth-child(3) { animation-delay: 0.3s; }
        #result-screen.active .stagger:nth-child(4) { animation-delay: 0.4s; }

        .result-header-label {
            font-family: var(--font-pixel);
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            background: var(--ink-black);
            color: #fff;
            padding: 5px 15px;
            border-radius: 20px;
            margin-bottom: 10px;
            transform: rotate(-2deg);
        }

        .result-type {
            font-family: var(--font-round);
            font-size: clamp(2rem, 10vw, 3rem);
            font-weight: 800;
            line-height: 1.1;
            margin: 0 0 10px 0;
            color: #fff;
            -webkit-text-stroke: 2px var(--ink-black);
            text-shadow: 4px 4px 0px var(--theme-color);
            text-align: center;
        }

        .result-summary {
            font-family: var(--font-round);
            font-weight: 800;
            font-size: clamp(1rem, 5vw, 1.3rem);
            background: var(--card-bg);
            border: 3px solid var(--ink-black);
            border-radius: 15px;
            padding: 10px 15px;
            margin-bottom: 25px;
            box-shadow: var(--pop-shadow);
            transform: rotate(1deg);
            text-align: center;
        }

        .sticker-card {
            border: 4px solid var(--ink-black);
            border-radius: 20px;
            background: var(--card-bg);
            padding: 25px 5vw;
            margin-bottom: 25px;
            position: relative;
            box-shadow: var(--pop-shadow);
            width: 100%;
        }
        
        .sticker-title {
            font-family: var(--font-pixel);
            background: var(--theme-color);
            color: var(--ink-black);
            position: absolute;
            top: -15px;
            left: 15px;
            padding: 4px 15px;
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            font-weight: 700;
            border: 3px solid var(--ink-black);
            border-radius: 15px;
            transform: rotate(-3deg);
        }

        .res-text-content {
            font-family: var(--font-round);
            font-size: clamp(0.95rem, 4.5vw, 1.1rem);
            font-weight: 800;
            line-height: 1.6;
            margin-top: 10px;
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }
        .tag-pop {
            font-family: var(--font-round);
            font-weight: 800;
            font-size: clamp(0.85rem, 4vw, 0.95rem);
            background: var(--bg-base);
            border: 2px solid var(--ink-black);
            color: var(--ink-black);
            padding: 6px 12px;
            border-radius: 20px;
            box-shadow: 2px 2px 0px var(--ink-black);
        }

        /* グラフ（ぷっくりしたバー） */
        .score-charts-container {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .score-row {
            display: flex;
            align-items: center;
            font-family: var(--font-pixel);
            font-size: clamp(1rem, 4.5vw, 1.2rem);
        }
        .score-label { width: 30px; font-weight: bold; }
        .score-bar-bg {
            flex-grow: 1;
            height: clamp(18px, 6vw, 24px);
            border: 3px solid var(--ink-black);
            background: #EEEEEE;
            border-radius: 15px;
            margin: 0 10px;
            overflow: hidden;
            box-shadow: inset 2px 2px 0px rgba(0,0,0,0.1);
        }
        .score-fill {
            height: 100%;
            background: var(--theme-color);
            width: 0%;
            border-right: 3px solid var(--ink-black);
            transition: width 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .score-num { width: 25px; text-align: right; }

        /* アニメーション定義 */
        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        /* 小型スマホ（iPhone SEなど）向けの微調整 */
        @media (max-width: 375px) {
            .progress-container { gap: 5px; }
            .btn-pop { padding: 12px 10px; }
            .sticker-card { padding: 20px 4vw; }
        }
    </style>
</head>
<body>

<div id="app">
    <div class="marquee-header">
        <div class="marquee-content">
            ★☆★ VIBES CHECK 2026 ★☆★ KNOW YOUR REAL SELF ★☆★ NO "NEITHER" ALLOWED ★☆★ 
        </div>
    </div>

    <div id="start-screen" class="screen active">
        <div class="title-badge stagger">14 TYPES DIAGNOSIS</div>
        <h1 class="main-title stagger">フォー・ユー<br>診断</h1>
        
        <div class="hero-image-placeholder stagger">👾</div>
        
        <div class="stagger" style="font-family: var(--font-round); font-weight: 800; background: var(--card-bg); border: 3px solid var(--ink-black); padding: 10px 15px; border-radius: 15px; box-shadow: var(--pop-shadow); margin-bottom: 30px; text-align: center; font-size: clamp(0.9rem, 4vw, 1rem);">
            「どちらでもない」は禁止！<br>直感でバシバシ答えてね👆
        </div>
        
        <button class="btn-pop stagger" onclick="startQuiz()">はじめる！</button>
    </div>

    <div id="question-screen" class="screen">
        <div class="progress-container">
            <div class="q-counter" id="q-counter">Q.1</div>
            <div class="progress-bar-pop">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </div>
        
        <div class="question-card" id="question-text"></div>
        
        <div class="answers">
            <button class="answer-btn" onclick="answer(4)">完全にそう！💖</button>
            <button class="answer-btn" onclick="answer(3)">まあそうかな✌️</button>
            <button class="answer-btn" onclick="answer(2)">少し違うかも💦</button>
            <button class="answer-btn" onclick="answer(1)">ぜんぜん違う🙅‍♀️</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <div class="stagger" style="display:flex; flex-direction:column; align-items:center; width: 100%;">
            <div class="result-header-label">YOUR MY-CHARA</div>
            <h2 class="result-type" id="res-id">TYPE-ID</h2>
            <div class="result-summary" id="res-summary">SUMMARY</div>
        </div>

        <div class="sticker-card stagger">
            <div class="sticker-title">基本ステータス</div>
            <p id="res-drive" class="res-text-content" style="font-size: clamp(1.1rem, 5vw, 1.2rem); color: var(--theme-color);"></p>
            <p id="res-style" class="res-text-content" style="border-top: 2px dashed var(--ink-black); padding-top: 10px;"></p>
        </div>

        <div class="sticker-card stagger">
            <div class="sticker-title" style="background: var(--accent-yellow);">あなたの強み✨</div>
            <div id="res-strengths" class="tag-container"></div>
        </div>

        <div class="sticker-card stagger" style="background: #FFF0F5;">
            <div class="sticker-title" style="background: var(--ink-black); color: #fff;">絶対NGな弱点💣</div>
            <div id="res-weakness" class="tag-container" style="margin-bottom: 15px;"></div>
            <p id="res-trigger" class="res-text-content" style="color: var(--accent-pink); border: 2px solid var(--accent-pink); padding: 10px; border-radius: 10px; background: #fff;"></p>
        </div>

        <div class="sticker-card stagger" style="padding-bottom: 30px;">
            <div class="sticker-title" style="background: var(--accent-green);">パラメーター📊</div>
            <div id="score-charts" class="score-charts-container"></div>
        </div>

        <button class="btn-pop stagger" onclick="location.reload()" style="margin-top: 10px;">もう1回やる！</button>
    </div>
</div>

<script>
    const questions = [
        "遊びやご飯に行くとき、自分からプランを提案することが多い。", 
        "グループワークで意見がまとまらないと、つい自分が仕切ってしまう。", 
        "納得いかないルールには、先輩や先生が相手でも反論したくなる。", 
        "話すときは、聞き役よりも自分が話す側になることが多い。", 
        "嬉しいときや楽しいときは、顔や声にすぐ出てしまう。", 
        "話すとき、身振り手振りが大きくなったり、擬音をよく使う。", 
        "映画や動画を見て、よく泣いたり大笑いしたりする。", 
        "はじめて会う人とも、すぐに打ち解けて雑談できる。", 
        "ゲームでもテストでも、やるからには「結果」や「勝ち」にこだわりたい。", 
        "何をするにしても「ノリ」と「楽しさ」が一番大事だと思う。", 
        "自分の意見を通すより、みんなが平和に過ごせるほうが大切だ。", 
        "物事の「仕組み」や「なぜそうなるのか」を深く知るのが好きだ。", 
        "迷ったときは「目標を達成できるか」「効率が良いか」で決める。", 
        "迷ったときは「ワクワクするか」「面白そうか」の直感で決める。", 
        "迷ったときは「誰かが嫌な思いをしないか」「迷惑をかけないか」で決める。", 
        "迷ったときは「データや事実に基づいているか」「理にかなっているか」で決める。", 
        "ダラダラと結論が出ない話し合いや、無駄な作業をさせられるとイライラする。", 
        "盛り上がっている空気を読まずに、マジレスして場を冷ます人が苦手だ。", 
        "誰かが怒られていたり、ギスギスした空気の場所にいると胃が痛くなる。", 
        "根拠のない「感情論」や「ノリ」だけで物事を決められると納得できない。" 
    ];

    const typeDict = {
        "C-C": { hex: "#FF9100", drive: "勝つ・達成する・主導する", style: "感情を排し強く押し切る", strength: ["突破力", "即断即決", "結果責任"], weakness: ["支配的", "配慮不足", "駒化"], trigger: "無能扱い / 主導権喪失", summary: "目標＝存在意義" },
        "C-P": { hex: "#FFC400", drive: "勝ちたい・達成したい", style: "盛り上げながら攻める", strength: ["熱量牽引", "カリスマ", "勢い"], weakness: ["勢い任せ", "ムード依存"], trigger: "場を冷やされる / 否定", summary: "勝利をエンタメ化" },
        "C-A": { hex: "#FF3D00", drive: "勝ちたい・成果を出したい", style: "理詰めで攻略する", strength: ["戦略設計", "合理突破", "冷静判断"], weakness: ["冷酷印象", "柔軟性不足"], trigger: "非効率 / 感情論", summary: "勝利＝戦略証明" },
        "P-P": { hex: "#F50057", drive: "楽しいが正義", style: "感情全開で共鳴拡散", strength: ["ムード形成", "共感力", "元気供給"], weakness: ["飽きやすい", "浅広い"], trigger: "退屈 / 無反応", summary: "面白さが基準" },
        "P-S": { hex: "#FF4081", drive: "みんなで楽しく", style: "調和を守り盛り上げる", strength: ["場作り", "共感力", "安心感"], weakness: ["衝突回避過剰", "八方美人"], trigger: "ギスギス / 冷たい態度", summary: "空気を壊さない" },
        "S-S": { hex: "#00E676", drive: "波風を立てたくない", style: "徹底配慮・自己抑制", strength: ["安心供給", "信頼蓄積"], weakness: ["優柔不断", "依存形成"], trigger: "強圧 / 対立", summary: "安定こそ善" },
        "S-A": { hex: "#76FF03", drive: "関係を壊したくない", style: "慎重に考えて動く", strength: ["調整力", "中立性", "橋渡し"], weakness: ["考えすぎ", "存在感薄"], trigger: "急かし / 不公平", summary: "理解して配慮" },
        "A-A": { hex: "#2979FF", drive: "真理を掘りたい", style: "徹底分析・感情排除", strength: ["深掘力", "専門性", "正確性"], weakness: ["孤立", "完璧主義"], trigger: "予定変更 / 浅い議論", summary: "正しさが安心" },
        "C-S": { hex: "#00B0FF", drive: "勝ちたい・守りたい", style: "強さと優しさを同時に出す", strength: ["理想リーダー", "守り勝つ"], weakness: ["内的葛藤", "自己消耗"], trigger: "信頼破壊 / 極論", summary: "強く優しい" },
        "P-A": { hex: "#D500F9", drive: "楽しい・深めたい", style: "直感と論理を往復する", strength: ["知的エンタメ", "創造力"], weakness: ["方向揺れ", "一貫性不足"], trigger: "浅さ / 退屈", summary: "直感×論理" },
        "P-C": { hex: "#FF6D00", drive: "ノリ良く勝ちたい", style: "圧倒的行動力で巻き込む", strength: ["実行力", "巻き込み力", "楽観性"], weakness: ["計画性不足", "ルール無視"], trigger: "自由の剥奪", summary: "楽しんだモン勝ち" },
        "S-P": { hex: "#F48FB1", drive: "みんなで楽しみたい", style: "空気を読んで同調する", strength: ["柔軟性", "愛嬌", "ムードメーカー"], weakness: ["自己主張不足", "流されやすい"], trigger: "対立 / 決断の強要", summary: "平和なエンタメ" },
        "A-S": { hex: "#00E5FF", drive: "穏やかに理解したい", style: "論理と配慮のハイブリッド", strength: ["客観的サポート", "傾聴力", "冷静判断"], weakness: ["行動の遅れ", "感情表現の苦手さ"], trigger: "理不尽な怒り", summary: "優しい合理主義" },
        "A-C": { hex: "#651FFF", drive: "確実に結果を出したい", style: "感情を排し最短ルートを探る", strength: ["緻密な計画", "トラブル解決", "論理的突破"], weakness: ["冷たい印象", "プロセス軽視"], trigger: "非合理なルール", summary: "静かなる支配者" }
    };

    let currentQ = 0;
    let answers = [];

    function startQuiz() {
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('question-screen').classList.add('active');
        showQuestion();
    }

    function showQuestion() {
        const qCard = document.getElementById('question-text');
        qCard.style.animation = 'none';
        void qCard.offsetWidth;
        
        document.getElementById('q-counter').innerText = `Q.${currentQ + 1}`;
        document.getElementById('progress-fill').style.width = `${((currentQ + 1) / 20) * 100}%`;
        qCard.innerText = questions[currentQ];
        
        qCard.style.animation = 'bounceIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards';
    }

    function answer(value) {
        answers.push(value);
        currentQ++;
        if (currentQ < 20) {
            setTimeout(showQuestion, 150);
        } else {
            calculateResult();
        }
    }

    function calculateResult() {
        let as = 0, re = 0, c_add = 0, p_add = 0, s_add = 0, a_add = 0;
        
        answers.forEach((val, i) => {
            let qNum = i + 1;
            if (qNum <= 4) as += val;
            else if (qNum <= 8) re += val;
            else if ([9, 13, 17].includes(qNum)) c_add += val;
            else if ([10, 14, 18].includes(qNum)) p_add += val;
            else if ([11, 15, 19].includes(qNum)) s_add += val;
            else if ([12, 16, 20].includes(qNum)) a_add += val;
        });

        let score_C = (as + (20 - re)) + c_add;
        let score_P = (as + re) + p_add;
        let score_S = ((20 - as) + re) + s_add;
        let score_A = ((20 - as) + (20 - re)) + a_add;

        let scores = [
            { type: 'C', score: score_C },
            { type: 'P', score: score_P },
            { type: 'S', score: score_S },
            { type: 'A', score: score_A }
        ];

        let rawScores = JSON.parse(JSON.stringify(scores));
        scores.sort((a, b) => b.score - a.score);

        let primary = scores[0].type;
        let secondary = scores[1].type;
        let diff = scores[0].score - scores[1].score;
        let finalTypeKey = "";

        if (diff >= 4) {
            finalTypeKey = `${primary}-${primary}`;
        } else {
            let combo = `${primary}-${secondary}`;
            if (combo === "S-C" || combo === "C-S") finalTypeKey = "C-S"; 
            else if (combo === "A-P" || combo === "P-A") finalTypeKey = "P-A"; 
            else finalTypeKey = combo;
        }

        let resData = typeDict[finalTypeKey];
        
        document.documentElement.style.setProperty('--theme-color', resData.hex);

        document.getElementById('res-id').innerText = finalTypeKey;
        document.getElementById('res-summary').innerText = `"${resData.summary}"`;
        document.getElementById('res-drive').innerText = resData.drive;
        document.getElementById('res-style').innerText = resData.style;
        document.getElementById('res-trigger').innerText = `NG行動👉 ${resData.trigger}`;

        document.getElementById('res-strengths').innerHTML = resData.strength.map(s => `<span class="tag-pop" style="background:${resData.hex}; color:#fff; border-color:${resData.hex};">${s}</span>`).join('');
        document.getElementById('res-weakness').innerHTML = resData.weakness.map(w => `<span class="tag-pop">${w}</span>`).join('');

        let maxScore = 0; rawScores.forEach(s => {if(s.score > maxScore) maxScore = s.score;});
        let chartHTML = "";
        ['C','P','S','A'].forEach(typeKey => {
            let s = rawScores.find(x => x.type === typeKey);
            let width = (s.score / maxScore) * 100;
            let barColor = (typeKey === primary) ? 'var(--theme-color)' : '#9E9E9E';
            chartHTML += `
                <div class="score-row">
                    <div class="score-label" style="color:${barColor};">${s.type}</div>
                    <div class="score-bar-bg">
                        <div class="score-fill" style="background:${barColor};" data-width="${width}%"></div>
                    </div>
                    <div class="score-num">${s.score}</div>
                </div>
            `;
        });
        document.getElementById('score-charts').innerHTML = chartHTML;

        document.getElementById('question-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        window.scrollTo(0,0);

        setTimeout(() => {
            const fills = document.querySelectorAll('#score-charts .score-fill');
            fills.forEach(f => f.style.width = f.getAttribute('data-width'));
        }, 300);
    }
</script>

</body>
</html>
