<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🌟 新・フォーユー診断 🌟</title>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Kiwi+Maru:wght@500;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      /* Playful / Neo-Pop Colors */
      --bg-base: #E0F7FA;
      --ink-black: #111111;
      --card-bg: #FFFFFF;

      /* アクセントカラー */
      --accent-pink: #FF4081;
      --accent-yellow: #FFEA00;
      --accent-green: #00E676;
      --accent-purple: #D500F9;

      /* 動的テーマカラー */
      --theme-color: var(--accent-pink);

      /* Typography */
      --font-pixel: 'DotGothic16', sans-serif;
      --font-round: 'Kiwi Maru', serif;

      /* Chunky Shadows */
      --pop-shadow: 4px 4px 0px var(--ink-black);
      --pop-shadow-active: 0px 0px 0px var(--ink-black);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      word-wrap: break-word;
    }

    body {
      background-color: var(--bg-base);
      color: var(--ink-black);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
      background-image: radial-gradient(var(--ink-black) 2px, transparent 2px);
      background-size: 20px 20px;
      font-family: var(--font-round);
    }

    #app {
      width: 100%;
      max-width: 480px;
      background: var(--bg-base);
      border-left: 4px solid var(--ink-black);
      border-right: 4px solid var(--ink-black);
      display: flex;
      flex-direction: column;
      position: relative;
      min-height: 100vh;
      border-left-width: clamp(0px, 1vw, 4px);
      border-right-width: clamp(0px, 1vw, 4px);
    }

    .marquee-header {
      background: var(--accent-yellow);
      color: var(--ink-black);
      font-family: var(--font-pixel);
      font-weight: 400;
      font-size: 1.1rem;
      padding: 8px 0;
      border-bottom: 4px solid var(--ink-black);
      overflow: hidden;
      white-space: nowrap;
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      z-index: 100;
    }

    .marquee-content {
      display: inline-block;
      animation: marquee 15s linear infinite;
    }

    @keyframes marquee {
      0% {
        transform: translateX(100%);
      }

      100% {
        transform: translateX(-100%);
      }
    }

    .screen {
      display: none;
      flex-direction: column;
      padding: 70px 5vw 40px 5vw;
      flex-grow: 1;
      position: relative;
      align-items: center;
    }

    .screen.active {
      display: flex;
    }

    /* --- スタート画面 --- */
    #start-screen.active .stagger {
      animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
      opacity: 0;
      transform: scale(0.5);
    }

    #start-screen.active .stagger:nth-child(1) {
      animation-delay: 0.1s;
    }

    #start-screen.active .stagger:nth-child(2) {
      animation-delay: 0.2s;
    }

    #start-screen.active .stagger:nth-child(3) {
      animation-delay: 0.3s;
    }

    #start-screen.active .stagger:nth-child(4) {
      animation-delay: 0.4s;
    }

    .title-badge {
      background: var(--accent-pink);
      color: #fff;
      font-family: var(--font-pixel);
      padding: 5px 15px;
      border: 3px solid var(--ink-black);
      border-radius: 20px;
      font-size: clamp(1rem, 4vw, 1.2rem);
      transform: rotate(-5deg);
      margin-bottom: 15px;
      box-shadow: var(--pop-shadow);
    }

    .main-title {
      font-family: var(--font-round);
      font-size: clamp(2.5rem, 11vw, 3.8rem);
      line-height: 1.1;
      font-weight: 800;
      margin: 0 0 20px 0;
      text-align: center;
      color: #fff;
      -webkit-text-stroke: clamp(2px, 0.8vw, 3px) var(--ink-black);
      text-shadow: 4px 4px 0px var(--accent-purple);
      transform: rotate(2deg);
    }

    .hero-image-placeholder {
      font-size: clamp(4rem, 15vw, 5rem);
      margin: 10px 0 20px 0;
      animation: float 3s ease-in-out infinite;
    }

    .adult-notice {
      font-family: var(--font-round);
      font-weight: 800;
      background: var(--ink-black);
      color: var(--accent-yellow);
      border: 3px solid #fff;
      padding: 10px 15px;
      border-radius: 10px;
      margin-bottom: 25px;
      text-align: center;
      font-size: clamp(0.85rem, 3.5vw, 0.95rem);
      transform: rotate(-1deg);
    }

    .btn-pop {
      font-family: var(--font-pixel);
      font-size: clamp(1.2rem, 6vw, 1.6rem);
      background: var(--card-bg);
      color: var(--ink-black);
      border: 4px solid var(--ink-black);
      border-radius: 30px;
      padding: 15px 10px;
      cursor: pointer;
      box-shadow: 0px 8px 0px var(--ink-black);
      transition: all 0.1s;
      margin-top: auto;
      margin-bottom: 20px;
      width: 100%;
      max-width: 320px;
    }

    .btn-pop:active {
      transform: translateY(8px);
      box-shadow: 0px 0px 0px var(--ink-black);
    }

    /* --- 設問画面 --- */
    .progress-container {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }

    .progress-bar-pop {
      flex-grow: 1;
      height: 20px;
      border: 3px solid var(--ink-black);
      background: var(--card-bg);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 2px 2px 0px var(--ink-black);
    }

    .progress-fill {
      height: 100%;
      background: var(--accent-green);
      width: 0%;
      transition: width 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    .q-counter {
      font-family: var(--font-pixel);
      font-size: clamp(1.2rem, 5vw, 1.5rem);
      font-weight: 700;
      color: var(--ink-black);
      background: var(--accent-yellow);
      padding: 5px 10px;
      border: 3px solid var(--ink-black);
      border-radius: 10px;
      transform: rotate(3deg);
      white-space: nowrap;
    }

    .btn-back {
      align-self: flex-start;
      font-family: var(--font-pixel);
      font-size: 0.9rem;
      background: #EEEEEE;
      border: 2px solid var(--ink-black);
      border-radius: 10px;
      padding: 5px 10px;
      margin-bottom: 15px;
      cursor: pointer;
      box-shadow: 2px 2px 0px var(--ink-black);
      visibility: hidden;
      /* 1問目は非表示 */
    }

    .btn-back:active {
      transform: translate(2px, 2px);
      box-shadow: 0px 0px 0px var(--ink-black);
    }

    .question-card {
      font-family: var(--font-round);
      font-size: clamp(1.1rem, 5vw, 1.3rem);
      font-weight: 800;
      line-height: 1.6;
      border: 4px solid var(--ink-black);
      border-radius: 20px;
      background: var(--card-bg);
      padding: clamp(20px, 6vw, 30px) 20px;
      box-shadow: var(--pop-shadow);
      margin-bottom: 30px;
      width: 100%;
      text-align: center;
      min-height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .answer-btn {
      font-family: var(--font-round);
      font-weight: 800;
      font-size: clamp(1rem, 4vw, 1.2rem);
      background: var(--card-bg);
      border: 3px solid var(--ink-black);
      border-radius: 15px;
      color: var(--ink-black);
      padding: clamp(12px, 4vw, 15px);
      text-align: center;
      cursor: pointer;
      box-shadow: 4px 4px 0px var(--ink-black);
      transition: all 0.1s;
    }

    .answer-btn:nth-child(1):active {
      background: var(--accent-pink);
      color: #fff;
    }

    .answer-btn:nth-child(2):active {
      background: var(--accent-yellow);
    }

    .answer-btn:nth-child(3):active {
      background: var(--accent-green);
    }

    .answer-btn:nth-child(4):active {
      background: #40C4FF;
    }

    .answer-btn:active {
      transform: translate(4px, 4px);
      box-shadow: 0px 0px 0px var(--ink-black);
    }

    /* --- 結果画面 --- */
    #result-screen {
      padding-top: 50px;
      justify-content: center;
    }

    #result-screen.active .stagger {
      opacity: 0;
      animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
    }

    .sticker-card {
      border: 4px solid var(--ink-black);
      border-radius: 20px;
      background: var(--card-bg);
      padding: 30px 5vw;
      margin-bottom: 25px;
      position: relative;
      box-shadow: var(--pop-shadow);
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .result-illustration {
      font-size: clamp(4rem, 15vw, 5.5rem);
      margin-bottom: 15px;
      filter: drop-shadow(4px 4px 0px rgba(0, 0, 0, 0.2));
      animation: float 3s ease-in-out infinite;
    }

    .result-header-label {
      font-family: var(--font-pixel);
      font-size: clamp(0.9rem, 4vw, 1.1rem);
      background: var(--ink-black);
      color: #fff;
      padding: 5px 15px;
      border-radius: 20px;
      margin-bottom: 10px;
      transform: rotate(-2deg);
      display: inline-block;
    }

    .result-type {
      font-family: var(--font-round);
      font-size: clamp(2.2rem, 10vw, 3.2rem);
      font-weight: 800;
      line-height: 1.2;
      margin: 0 0 15px 0;
      color: #fff;
      -webkit-text-stroke: 2px var(--ink-black);
      text-shadow: 4px 4px 0px var(--theme-color);
    }

    .result-summary {
      font-family: var(--font-round);
      font-weight: 800;
      font-size: clamp(1.1rem, 5vw, 1.4rem);
      background: var(--bg-base);
      border: 3px solid var(--ink-black);
      border-radius: 15px;
      padding: 10px 20px;
      box-shadow: 2px 2px 0px var(--ink-black);
      transform: rotate(1deg);
      color: var(--ink-black);
    }

    @keyframes bounceIn {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }

      70% {
        transform: scale(1.05);
        opacity: 1;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-10px) rotate(3deg);
      }
    }
  </style>
</head>

<body>

  <div id="app">
    <div class="marquee-header">
      <div class="marquee-content">
        ★☆★ YOUR REAL SELF 2026 ★☆★ KNOW YOUR TYPE ★☆★ VIBES CHECK ★☆★
      </div>
    </div>

    <div id="start-screen" class="screen active">
      <div class="title-badge stagger">性格14タイプ診断</div>
      <h1 class="main-title stagger">フォーユー診断</h1>

      <div class="hero-image-placeholder stagger">👾🎮✨</div>

      <div class="stagger adult-notice">
        ⚠️ 大人の人は<br>中学生くらいの自分の性格で回答してね！
      </div>

      <div class="stagger"
        style="font-family: var(--font-round); font-weight: 800; background: var(--card-bg); border: 3px solid var(--ink-black); padding: 10px 15px; border-radius: 15px; box-shadow: var(--pop-shadow); margin-bottom: 30px; text-align: center; font-size: clamp(0.9rem, 4vw, 1rem);">
        「どちらでもない」は禁止！<br>直感でバシバシ答えてね👆
      </div>

      <button class="btn-pop stagger" onclick="startQuiz()">はじめる！</button>
    </div>

    <div id="question-screen" class="screen">
      <button class="btn-back" id="back-btn" onclick="goBack()">◀ まえに戻る</button>

      <div class="progress-container">
        <div class="q-counter" id="q-counter">Q.1</div>
        <div class="progress-bar-pop">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </div>

      <div class="question-card" id="question-text"></div>

      <div class="answers">
        <button class="answer-btn" onclick="answer(4)">完全にそう！💖</button>
        <button class="answer-btn" onclick="answer(3)">まあそうかな✌️</button>
        <button class="answer-btn" onclick="answer(2)">少し違うかも💦</button>
        <button class="answer-btn" onclick="answer(1)">ぜんぜん違う🙅‍♀️</button>
      </div>
    </div>

    <div id="result-screen" class="screen">
      <div class="sticker-card stagger">
        <div class="result-illustration" id="res-ill"></div>
        <div class="result-header-label" id="res-type-small"></div>
        <h2 class="result-type" id="res-name"></h2>
        <div class="result-summary" id="res-core"></div>
      </div>

      <button class="btn-pop stagger" onclick="location.reload()" style="margin-top: 10px;">最初からやり直す！</button>
    </div>
  </div>

  <script>
    // 中学生向けに意訳した設問リスト（全20問ミックス）
    const questions = [
        { text: "「嫌なことは嫌！」と先生や先輩相手でもハッキリ言えちゃう。", type: "C" },
        { text: "「将来〇〇になりたい！」「来週の行事楽しみ！」と、先のことばかり考えてワクワクしている。", type: "P" },
        { text: "友達のために何かしてあげたのに、「ありがとう」と言われないと結構モヤモヤする。", type: "S" },
        { text: "会議や話し合いで、自分の意見をみんなの前で発表するのは苦手だ。", type: "A" },
        { text: "休み時間や放課後は、少しの時間でも無駄にせずいろいろ詰め込んじゃう。", type: "C" },
        { text: "クラスメイトから「一緒にいると面白いね」とよく言われる。", type: "P" },
        { text: "友達から「これ手伝って！」と頼まれると、断れずに引き受けちゃう。", type: "S" },
        { text: "初対面の人やあまり話したことない人には、かなり警戒しちゃう。", type: "A" },
        { text: "友達と話すとき、思ったことをそのままズバッと言っちゃうことが多い。", type: "C" },
        { text: "先生に怒られたり、テストの点が悪くても、「ま、いっか！」とすぐ立ち直れる。", type: "P" },
        { text: "「あの子は頭がいいな」「あの子は運動できるな」と、つい自分と周りを比べちゃう。", type: "S" },
        { text: "班の目標を決めたり何かを選ぶ時は、情報をいっぱい集めてじっくり考えたい。", type: "A" },
        { text: "テストの点数や体育の試合など、勝負事になると絶対に負けたくない！", type: "C" },
        { text: "友達とおしゃべりしていると、いつの間にか自分がずっと話している。", type: "P" },
        { text: "クラスで困っている人がいると、つい声をかけて世話を焼いちゃう。", type: "S" },
        { text: "新しいクラスになった時は、自分から話しかけるより様子を見ちゃう人見知りタイプ。", type: "A" },
        { text: "ノートをまとめたり、係の仕事をする時は、完璧にやらないと気が済まない。", type: "C" },
        { text: "席替えやクラス替えなど、新しい環境になるとテンションが上がる。", type: "P" },
        { text: "係の仕事や掃除など、頑張ったことは先生や友達から「えらいね！」って褒められたい。", type: "S" },
        { text: "嬉しいときや悲しいときに、顔や態度に感情を出すのがあまり得意じゃない。", type: "A" }
    ];

    // 14分類の定義データ
    const typeDict = {
        "C-C": { name: "突破隊長", core: "突破・達成・最短距離", hex: "#FF3D00", emoji: "🔥🏃‍♂️💨" },
        "C-P": { name: "先導ランナー", core: "熱量で周囲を引っ張る", hex: "#FF9100", emoji: "📣🔥🏃‍♀️" },
        "C-A": { name: "クール参謀", core: "合理的に勝ちへ向かう", hex: "#00B0FF", emoji: "😎📊♟️" },
        "P-C": { name: "主役エンジン", core: "主役感＋突破力", hex: "#FFD600", emoji: "🌟👑🚀" },
        "P-P": { name: "お祭り屋", core: "楽しい・盛り上げる・感情表現", hex: "#F50057", emoji: "🎉🥳🎶" },
        "P-S": { name: "仲良しメーカー", core: "楽しい空気＋親しみ", hex: "#FF4081", emoji: "🤝😆✨" },
        "S-P": { name: "おせっかい団長", core: "優しさ＋社交性", hex: "#FF80AB", emoji: "🥰🙌💖" },
        "S-S": { name: "ほっとメーカー", core: "安心・受容・寄り添い", hex: "#00E676", emoji: "🍵😌🍀" },
        "S-A": { name: "気配り職人", core: "静かな配慮・支援", hex: "#76FF03", emoji: "🪄🤫🌸" },
        "A-C": { name: "ロジック隊長", core: "論理で成果へ向かう", hex: "#2979FF", emoji: "💻📈⚡" },
        "A-S": { name: "空気観測員", core: "慎重＋配慮＋観察", hex: "#00E5FF", emoji: "🔭🌱👀" },
        "A-A": { name: "深掘り職人", core: "分析・理解・探究", hex: "#651FFF", emoji: "🧐🔬📚" },
        "SC融合": { name: "仲間守り隊", core: "優しさと突破力の両立", hex: "#00BFA5", emoji: "🛡️🦁💖" },
        "AP融合": { name: "ひらめき博士", core: "感性×探究×発想", hex: "#D500F9", emoji: "💡🤯🎨" }
    };

    let currentQ = 0;
    let answersArray = [];

    function startQuiz() {
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('question-screen').classList.add('active');
        showQuestion();
    }

    function showQuestion() {
        const qCard = document.getElementById('question-text');
        const backBtn = document.getElementById('back-btn');
        
        // アニメーションのリセット
        qCard.style.animation = 'none';
        void qCard.offsetWidth; // リフロー強制
        
        document.getElementById('q-counter').innerText = `Q.${currentQ + 1}`;
        document.getElementById('progress-fill').style.width = `${((currentQ + 1) / 20) * 100}%`;
        qCard.innerText = questions[currentQ].text;
        
        // 戻るボタンの表示制御
        backBtn.style.visibility = (currentQ > 0) ? 'visible' : 'hidden';

        qCard.style.animation = 'bounceIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards';
    }

    function answer(scoreValue) {
        answersArray[currentQ] = { type: questions[currentQ].type, score: scoreValue };
        currentQ++;
        
        if (currentQ < 20) {
            setTimeout(showQuestion, 150); // 少しディレイを入れてアニメーションを強調
        } else {
            calculateResult();
        }
    }

    function goBack() {
        if (currentQ > 0) {
            currentQ--;
            showQuestion();
        }
    }

    function calculateResult() {
        // 初期補正点（P:+1, S:+1, A:+2）
        let scores = { C: 0, P: 1, S: 1, A: 2 }; 
        let counts4 = { C: 0, P: 0, S: 0, A: 0 }; // 「完全にそう(4点)」の数
        let counts34 = { C: 0, P: 0, S: 0, A: 0 }; // 「ポジティブ回答(3・4点)」の数

        answersArray.forEach(ans => {
            scores[ans.type] += ans.score;
            if (ans.score === 4) counts4[ans.type]++;
            if (ans.score >= 3) counts34[ans.type]++;
        });

        let types = ['C', 'P', 'S', 'A'];
        
        // タイブレーク処理を含むソート
        types.sort((a, b) => {
            if (scores[b] !== scores[a]) return scores[b] - scores[a]; // ①合計点
            if (counts4[b] !== counts4[a]) return counts4[b] - counts4[a]; // ②4点の数
            if (counts34[b] !== counts34[a]) return counts34[b] - counts34[a]; // ③3,4点の数
            
            // ④それでも同点の場合の固定優先度 (C > P > S > A)
            let order = {C:4, P:3, S:2, A:1};
            return order[b] - order[a];
        });

        let primary = types[0];
        let secondary = types[1];
        let diff = scores[primary] - scores[secondary];

        let finalTypeKey = "";

        // 1位と2位の差が4点以上の場合は「純粋タイプ」
        if (diff >= 4) {
            finalTypeKey = `${primary}-${primary}`;
        } else {
            let combo = `${primary}-${secondary}`;
            // 融合タイプの特別判定
            if (combo === "S-C" || combo === "C-S") finalTypeKey = "SC融合";
            else if (combo === "A-P" || combo === "P-A") finalTypeKey = "AP融合";
            else finalTypeKey = combo;
        }

        // 万が一、定義データに存在しない組み合わせになった場合のフォールバック
        if (!typeDict[finalTypeKey]) {
            finalTypeKey = `${primary}-${primary}`;
        }

        const resData = typeDict[finalTypeKey];
        
        // 結果画面の描画
        document.documentElement.style.setProperty('--theme-color', resData.hex);
        document.getElementById('res-type-small').innerText = `TYPE: ${finalTypeKey}`;
        document.getElementById('res-name').innerText = resData.name;
        document.getElementById('res-core').innerText = resData.core;
        document.getElementById('res-ill').innerText = resData.emoji;

        document.getElementById('question-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        window.scrollTo(0,0);
    }
  </script>

</body>
